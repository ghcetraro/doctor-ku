services:
  doctor-ku:
    build: .
    container_name: doctor-ku
    ports:
      - "8089:8080"
    environment:
      - CONFIG_PATH=/config/clusters.yaml
      - PORT=8080
      - TZ=America/Argentina/Buenos_Aires
      - SSH_KEYS_DIR=/secrets/ssh
      - SCRIPTS_DIR=/scripts
      - LOG_LEVEL=INFO
    volumes:
      - ./config/clusters.example.yaml:/config/clusters.yaml:ro
      - ${SSH_KEYS_DIR:-./secrets/ssh}:/secrets/ssh:ro
      - ./scripts:/scripts:ro
      - doctor-ku-data:/data

volumes:
  doctor-ku-data:

networks:
  default:
    name: doctor-ku-net
