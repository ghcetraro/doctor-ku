<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-label="Doctor-ku architecture">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="520" fill="url(#bg)"/>

  <text x="480" y="42" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Ubuntu, sans-serif" font-size="28" font-weight="700">Doctor-ku</text>
  <text x="480" y="68" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Monitor y remediador automatico de clusters k3s</text>

  <!-- Kubernetes box -->
  <rect x="40" y="95" width="420" height="380" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="125" fill="#38bdf8" font-family="Segoe UI, Ubuntu, sans-serif" font-size="16" font-weight="600">Kubernetes</text>

  <rect x="70" y="150" width="160" height="56" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="150" y="183" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">CronJob</text>

  <rect x="70" y="230" width="160" height="56" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="150" y="263" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">Job (runner)</text>

  <rect x="70" y="310" width="160" height="56" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="150" y="343" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">PVC / state</text>

  <rect x="270" y="230" width="160" height="56" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="350" y="255" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Metrics</text>
  <text x="350" y="272" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="11">Deployment :8080</text>

  <line x1="150" y1="206" x2="150" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="150" y1="286" x2="150" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="258" x2="270" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="248" fill="#64748b" font-family="Segoe UI, sans-serif" font-size="10">POST metrics</text>

  <!-- k3s cluster box -->
  <rect x="500" y="95" width="420" height="380" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="125" fill="#22d3ee" font-family="Segoe UI, Ubuntu, sans-serif" font-size="16" font-weight="600">Cluster k3s</text>

  <rect x="530" y="180" width="110" height="70" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="585" y="215" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">master-01</text>
  <text x="585" y="235" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, sans-serif" font-size="11">Ready</text>

  <rect x="655" y="180" width="110" height="70" rx="8" fill="#0f172a" stroke="#f87171" stroke-width="2"/>
  <text x="710" y="215" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">master-02</text>
  <text x="710" y="235" text-anchor="middle" fill="#f87171" font-family="Segoe UI, sans-serif" font-size="11">missing</text>

  <rect x="780" y="180" width="110" height="70" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="835" y="215" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">master-03</text>
  <text x="835" y="235" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, sans-serif" font-size="11">Ready</text>

  <rect x="580" y="300" width="260" height="120" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="710" y="328" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Remediacion automatica</text>
  <text x="710" y="352" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="11">etcd cleanup · uninstall · reinstall</text>
  <text x="710" y="372" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="11">verify k3s + nodo Ready</text>
  <text x="710" y="398" text-anchor="middle" fill="#64748b" font-family="Segoe UI, sans-serif" font-size="10">SSH + Kubernetes API</text>

  <!-- arrows job to cluster -->
  <line x1="230" y1="258" x2="530" y2="258" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="248" fill="#38bdf8" font-family="Segoe UI, sans-serif" font-size="11">SSH + K8s API</text>

  <!-- Prometheus -->
  <rect x="270" y="390" width="160" height="56" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="350" y="423" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">Prometheus</text>
  <line x1="350" y1="286" x2="350" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="340" fill="#64748b" font-family="Segoe UI, sans-serif" font-size="10">/metrics</text>

  <rect x="40" y="485" width="880" height="24" rx="4" fill="#0f172a" opacity="0.6"/>
  <text x="480" y="502" text-anchor="middle" fill="#64748b" font-family="Segoe UI, sans-serif" font-size="11">Python · CronJob · Helm · Prometheus · k3s HA</text>
</svg>
