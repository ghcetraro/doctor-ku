{{- if .Values.secrets.sshKeys }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "doctor-ku.fullname" . }}-secrets
  labels:
    {{- include "doctor-ku.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $name, $content := .Values.secrets.sshKeys }}
  ssh-{{ $name }}: {{ $content | b64enc }}
  {{- end }}
{{- end }}
