{{- if .Values.base.deployment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "doctor-ku.fullname" . }}
  labels:
    {{- include "doctor-ku.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.base.deployment.replicaCount }}
  revisionHistoryLimit: {{ .Values.base.deployment.revisionHistoryLimit | default 0 }}
  selector:
    matchLabels:
      {{- include "doctor-ku.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "doctor-ku.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      annotations:
        checksum/config: {{ .Values.config | toYaml | sha256sum }}
        checksum/scripts: {{ .Files.Get "k3s-install.sh" | sha256sum }}
    spec:
      {{- if .Values.base.imagePullSecrets.enabled }}
      imagePullSecrets:
      - name: {{ .Values.base.imagePullSecrets.name | default "docker-registry" }}
      {{- end }}
      containers:
      - name: doctor-ku
        image: {{ .Values.base.deployment.ecr }}/{{ .Values.base.deployment.image }}:{{ .Values.base.deployment.tag }}
        imagePullPolicy: {{ .Values.base.deployment.pullPolicy | default "IfNotPresent" }}
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
        ports:
        - name: http
          containerPort: {{ .Values.base.deployment.containerPort | default .Values.base.deployment.port }}
          protocol: TCP
        env:
          {{- include "doctor-ku.containerEnv" . | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
        volumeMounts:
          {{- include "doctor-ku.volumeMounts" . | nindent 10 }}
        resources:
          {{- toYaml .Values.base.deployment.resources | nindent 10 }}
      volumes:
        {{- include "doctor-ku.volumes" . | nindent 8 }}
      {{- with .Values.base.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.base.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.base.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
