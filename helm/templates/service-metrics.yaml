{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "doctor-ku.fullname" . }}
  labels:
    {{- include "doctor-ku.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  {{- if .Values.metrics.prometheusAnnotations.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.metrics.service.port | quote }}
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "doctor-ku.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  ports:
  - name: http
    port: {{ .Values.metrics.service.port }}
    targetPort: http
    protocol: TCP
{{- end }}
