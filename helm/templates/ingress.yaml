{{- if and .Values.base.deployment.enabled .Values.base.deployment.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "doctor-ku.fullname" . }}
  labels:
    {{- include "doctor-ku.labels" . | nindent 4 }}
  {{- with .Values.base.deployment.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.base.deployment.ingress.className }}
  ingressClassName: {{ .Values.base.deployment.ingress.className }}
  {{- end }}
  {{- if .Values.base.deployment.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.base.deployment.ingress.host }}
      secretName: {{ include "doctor-ku.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.base.deployment.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "doctor-ku.fullname" . }}
                port:
                  number: {{ .Values.base.deployment.port }}
{{- end }}
